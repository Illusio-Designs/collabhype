<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" role="img" aria-label="Nano vs Micro influencers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c1d95"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <g fill="#ffffff" opacity="0.08">
    <circle cx="1010" cy="150" r="220"/>
    <circle cx="180" cy="560" r="160"/>
  </g>
  <text x="80" y="150" font-family="Jost, Segoe UI, sans-serif" font-size="30" letter-spacing="8" fill="#ffffff" opacity="0.85" font-weight="600">COLLABHYPE · BLOG</text>
  <text x="76" y="330" font-family="Jost, Segoe UI, sans-serif" font-size="96" fill="#ffffff" font-weight="800">Nano vs Micro</text>
  <text x="80" y="430" font-family="Jost, Segoe UI, sans-serif" font-size="46" fill="#ffffff" opacity="0.92" font-weight="500">Which creator tier fits your budget?</text>
  <g font-family="Jost, Segoe UI, sans-serif" fill="#ffffff">
    <rect x="80" y="500" width="235" height="64" rx="32" fill="#ffffff" opacity="0.14"/>
    <text x="112" y="541" font-size="28" font-weight="600">Nano · Under 1K</text>
    <rect x="335" y="500" width="250" height="64" rx="32" fill="#ffffff" opacity="0.14"/>
    <text x="367" y="541" font-size="28" font-weight="600">Micro · 1K–100K</text>
  </g>
